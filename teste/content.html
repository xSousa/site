<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      color: #a8a8a8;
      margin-bottom: 20px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .add-btn {
      background: #fff;
      color: #000;
    }

    .add-btn:hover {
      opacity: 0.9;
    }

    .clear-btn {
      background: #222;
      color: #fff;
      border: 1px solid #353535;
    }

    .clear-btn:hover {
      background: #2b2b2b;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  aspect-ratio: 1 / 1;
  cursor: pointer;
  border: 1px solid #2d2d2d;
}

.thumb-wrap {
  width: 100%;
  height: 100%;
}

.thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* OVERLAY ESCONDIDO */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.2));
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 14px;
  opacity: 0;
  transition: 0.25s ease;
}

/* MOSTRAR AO PASSAR RATO */
.card:hover .overlay {
  opacity: 1;
}

.overlay .title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
}

.overlay .download-btn {
  background: #fff;
  color: #000;
  text-align: center;
  padding: 8px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
}

    @media (max-width: 560px) {
      .actions,
      .modal-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Os meus downloads</h1>
    <div class="subtitle">Adiciona links manualmente com imagem, tudo em quadrados iguais.</div>

    <div class="topbar">
      <button class="add-btn" id="openModalBtn">+ Adicionar</button>
      <button class="clear-btn" id="clearAllBtn">Limpar tudo</button>
    </div>

    <div id="cardsContainer"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h2>Adicionar item</h2>

      <div class="field">
        <label for="titleInput">Título</label>
        <input type="text" id="titleInput" placeholder="Ex: Call of Duty 2" />
      </div>

      <div class="field">
        <label for="linkInput">Link de download</label>
        <input type="url" id="linkInput" placeholder="https://..." />
      </div>

      <div class="field">
        <label for="imageInput">Selecionar imagem</label>
        <input type="file" id="imageInput" accept="image/*" />
        <div class="preview" id="preview">Pré-visualização da imagem</div>
      </div>

      <div class="modal-actions">
        <button class="save-btn" id="saveBtn">Guardar</button>
        <button class="cancel-btn" id="closeModalBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "downloads_items_v1";

    const modal = document.getElementById("modal");
    const openModalBtn = document.getElementById("openModalBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");

    const titleInput = document.getElementById("titleInput");
    const linkInput = document.getElementById("linkInput");
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const cardsContainer = document.getElementById("cardsContainer");

    let imageData = "";

    function getItems() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function openModal() {
      modal.classList.add("active");
    }

    function closeModal() {
      modal.classList.remove("active");
      titleInput.value = "";
      linkInput.value = "";
      imageInput.value = "";
      imageData = "";
      preview.innerHTML = "Pré-visualização da imagem";
    }

    function renderItems() {
      const items = getItems();

      if (!items.length) {
        cardsContainer.innerHTML = `
          <div class="empty">
            Ainda não tens itens. Carrega em <strong>+ Adicionar</strong>.
          </div>
        `;
        return;
      }

      cardsContainer.innerHTML = `
        <div class="grid">
          ${items.map((item, index) => `
            <div class="card">
              <div class="thumb-wrap">
                ${
                  item.image
                    ? `<img src="${item.image}" alt="${escapeHtml(item.title)}">`
                    : `<div class="placeholder">Sem imagem</div>`
                }
              </div>

              <div class="card-body">
                <div class="title">${escapeHtml(item.title)}</div>
                <div class="url">${escapeHtml(item.link)}</div>

                <div class="actions">
                  <a class="download-btn" href="${item.link}" target="_blank" rel="noopener noreferrer">Abrir</a>
                  <a class="delete-btn" href="#" data-index="${index}">Apagar</a>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;

      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          const index = Number(this.dataset.index);
          deleteItem(index);
        });
      });
    }

    function deleteItem(index) {
      const items = getItems();
      items.splice(index, 1);
      saveItems(items);
      renderItems();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    imageInput.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        imageData = e.target.result;
        preview.innerHTML = `<img src="${imageData}" alt="Preview">`;
      };
      reader.readAsDataURL(file);
    });

    saveBtn.addEventListener("click", function () {
      const title = titleInput.value.trim();
      const link = linkInput.value.trim();

      if (!title || !link) {
        alert("Preenche o título e o link.");
        return;
      }

      const items = getItems();
      items.unshift({
        title,
        link,
        image: imageData
      });

      saveItems(items);
      renderItems();
      closeModal();
    });

    openModalBtn.addEventListener("click", openModal);
    closeModalBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", function (e) {
      if (e.target === modal) {
        closeModal();
      }
    });

    clearAllBtn.addEventListener("click", function () {
      if (confirm("Queres apagar todos os itens?")) {
        localStorage.removeItem(STORAGE_KEY);
        renderItems();
      }
    });

    renderItems();
  </script>
</body>
</html>
