<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloads</title>

  <style>
    * { box-sizing: border-box; }

    .logo {
      width: 100%;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }

    .logo img {
      width: 100%;
      max-width: 180px;
      border-radius: 12px;
      object-fit: cover;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
    }

    .layout {
      display: none;
      min-height: 100vh;
    }

    .layout.active {
      display: flex;
    }

    .sidebar {
      width: 240px;
      background: #111;
      border-right: 1px solid #232323;
      padding: 24px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin: 0 0 20px;
      font-size: 26px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu button {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #2d2d2d;
      background: #1a1a1a;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .menu button:hover,
    .menu button.active {
      background: #fff;
      color: #000;
    }

    .content {
      flex: 1;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topbar-left h1 {
      margin: 0 0 6px;
      font-size: 36px;
    }

    .subtitle {
      color: #aaa;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 11px 16px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .add-btn {
      background: #fff;
      color: #000;
    }

    .add-btn:hover {
      opacity: 0.92;
    }

    .logout-btn,
    .cancel-btn {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #333;
    }

    .logout-btn:hover,
    .cancel-btn:hover {
      background: #2a2a2a;
    }

    #sortSelect {
      padding: 11px 12px;
      border-radius: 12px;
      background: #1a1a1a;
      color: white;
      border: 1px solid #333;
      outline: none;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 220px));
      gap: 18px;
      justify-content: start;
      margin-bottom: 30px;
    }

    .card {
      width: 220px;
      height: 320px;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      background: #151515;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 28px rgba(0,0,0,0.45);
      z-index: 2;
    }

    .thumb-wrap {
      width: 100%;
      height: 100%;
      background: #161616;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      background: #111;
    }

    .placeholder {
      color: #777;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.18));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px;
      opacity: 0;
      transition: 0.25s ease;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    .category-tag {
      display: inline-block;
      align-self: flex-start;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #eaeaea;
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .download-btn,
    .delete-btn {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 9px 10px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .download-btn {
      background: #fff;
      color: #000;
    }

    .delete-btn {
      background: #272727;
      color: #fff;
      border: 1px solid #3a3a3a;
    }

    .empty {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 40px 20px;
      color: #888;
      text-align: center;
      max-width: 520px;
    }

    .chat-box {
      margin-top: 18px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 18px;
    }

    .chat-box h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 24px;
    }

    #messages {
      max-height: 420px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
      margin-bottom: 14px;
    }

    .msg {
      background: #1a1a1a;
      border: 1px solid #2b2b2b;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .msg:hover {
      background: #202020;
      border-color: #383838;
    }

    .msg-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .msg-user {
      font-size: 13px;
      color: #7bdff2;
      font-weight: bold;
      word-break: break-all;
    }

    .msg-time {
      font-size: 11px;
      color: #7f7f7f;
      white-space: nowrap;
    }

    .msg-text {
      color: #eaeaea;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .chat-delete-btn {
      background: transparent;
      border: none;
      color: #ff6b6b;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: bold;
      line-height: 1;
      flex: 0 0 auto;
    }

    .chat-delete-btn:hover {
      background: rgba(255, 0, 0, 0.1);
    }

    .chat-input {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: stretch;
    }

    .chat-input input {
      flex: 1;
      min-width: 220px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      outline: none;
      font-size: 14px;
    }

    .chat-input input:focus {
      border-color: #666;
    }

    .chat-input button {
      background: #fff;
      color: #000;
      flex: 0 0 auto;
    }

    .modal,
    .login-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal.active,
    .login-screen.active {
      display: flex;
    }

    .modal-box,
    .login-box {
      width: 100%;
      max-width: 500px;
      background: #111;
      border: 1px solid #2b2b2b;
      border-radius: 18px;
      padding: 20px;
    }

    .login-box {
      max-width: 420px;
    }

    .modal-box h3,
    .login-box h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: #d7d7d7;
      font-size: 14px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: #666;
    }

    .preview {
      width: 220px;
      height: 320px;
      background: #191919;
      border: 1px dashed #3a3a3a;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-top: 8px;
    }

    .preview img {
      width: 100%;
      height: 100%;
      background: #111;
    }

    .modal-actions,
    .login-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .save-btn,
    .login-btn {
      background: #fff;
      color: #000;
      flex: 1;
    }

    .error-box {
      color: #ff8f8f;
      margin-top: 10px;
      min-height: 20px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid #232323;
      }

      .menu {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .menu button {
        width: auto;
      }
    }

    @media (max-width: 560px) {
      .content {
        padding: 16px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 160px));
      }

      .card {
        width: 160px;
        height: 235px;
      }

      .preview {
        width: 160px;
        height: 235px;
      }

      .modal-actions,
      .actions,
      .login-actions,
      .chat-input {
        flex-direction: column;
      }

      .chat-input button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="loginScreen" class="login-screen active">
    <div class="login-box">
      <h2>Entrar</h2>

      <div class="field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="o-teu-email@email.com">
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="********">
      </div>

      <div class="login-actions">
        <button class="login-btn" id="loginBtn">Entrar</button>
      </div>

      <div id="loginError" class="error-box"></div>
    </div>
  </div>

  <div id="appLayout" class="layout">
    <aside class="sidebar">
      <div class="logo">
        <img src="xSousa-Repacks-26-03-2026 (1).gif" alt="Logo">
      </div>

      <h2>Menu</h2>

      <div class="menu">
        <button class="filter-btn active" data-filter="all">Tudo</button>
        <button class="filter-btn" data-filter="tools">Ferramentas</button>
        <button class="filter-btn" data-filter="jogos">Jogos</button>
        <button class="filter-btn" data-filter="filmes">Filmes</button>
        <button class="filter-btn" data-filter="vsts">VSTs</button>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="topbar-left">
          <h1>Os meus downloads</h1>
          <div class="subtitle">Passa o rato por cima para ver opções</div>
        </div>

        <div class="topbar-right">
          <select id="sortSelect">
            <option value="new">Mais recentes</option>
            <option value="old">Mais antigos</option>
          </select>

          <button id="addBtn" class="add-btn" onclick="openModal()">+ Adicionar</button>
          <button class="logout-btn" id="logoutBtn">Sair</button>
        </div>
      </div>

      <div id="grid" class="grid"></div>

      <div class="chat-box">
        <h2>Mensagens</h2>

        <div id="messages"></div>

        <div class="chat-input">
          <input id="messageInput" type="text" placeholder="Escreve uma mensagem...">
          <button id="sendBtn">Enviar</button>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h3>Adicionar item</h3>

      <div class="field">
        <label for="title">Título</label>
        <input id="title" type="text" placeholder="Ex: Call of Duty 2">
      </div>

      <div class="field">
        <label for="link">Link</label>
        <input id="link" type="url" placeholder="https://...">
      </div>

      <div class="field">
        <label for="category">Categoria</label>
        <select id="category">
          <option value="tools">Ferramentas</option>
          <option value="jogos">Jogos</option>
          <option value="filmes">Filmes</option>
          <option value="vsts">VSTs</option>
        </select>
      </div>

      <div class="field">
        <label for="fitMode">Ajuste da imagem</label>
        <select id="fitMode">
          <option value="cover">Cover (preencher tudo)</option>
          <option value="contain">Contain (mostrar imagem inteira)</option>
        </select>
      </div>

      <div class="field">
        <label for="image">Imagem</label>
        <input type="file" id="image" accept="image/*">
        <div class="preview" id="preview">Pré-visualização</div>
      </div>

      <div class="modal-actions">
        <button class="save-btn" onclick="save()">Guardar</button>
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCrF-J4HWzpHcws_RdFSsHDrYQqgMJKgvE",
      authDomain: "content-729f5.firebaseapp.com",
      projectId: "content-729f5",
      storageBucket: "content-729f5.firebasestorage.app",
      messagingSenderId: "541149104135",
      appId: "1:541149104135:web:25b1bd0d8e31f2bb64c2a2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const ADMIN_EMAIL = "enzo@xsousa.com";

    let imageData = "";
    let currentFilter = "all";
    let currentSort = "new";
    let allItems = [];
    let messagesUnsubscribe = null;

    const loginScreen = document.getElementById("loginScreen");
    const appLayout = document.getElementById("appLayout");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginError = document.getElementById("loginError");
    const addBtn = document.getElementById("addBtn");
    const grid = document.getElementById("grid");
    const messagesDiv = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDateTime(timestamp) {
      if (!timestamp) return "";
      const date = new Date(Number(timestamp));
      return date.toLocaleString("pt-PT");
    }

    function getCategoryLabel(category) {
      if (category === "tools") return "Ferramentas";
      if (category === "jogos") return "Jogos";
      if (category === "filmes") return "Filmes";
      if (category === "vsts") return "VSTs";
      return category;
    }

    async function loadItems() {
      try {
        const snapshot = await getDocs(collection(db, "items"));

        allItems = snapshot.docs.map(itemDoc => ({
          id: itemDoc.id,
          ...itemDoc.data()
        }));

        render();
      } catch (error) {
        console.error(error);
        grid.innerHTML = `<div class="empty">Erro ao carregar os itens.</div>`;
      }
    }

    function render() {
      let items = [...allItems];

      if (currentFilter !== "all") {
        items = items.filter(item => item.category === currentFilter);
      }

      items.sort((a, b) => {
        const aDate = Number(a.createdAt || 0);
        const bDate = Number(b.createdAt || 0);

        if (currentSort === "new") {
          return bDate - aDate;
        } else {
          return aDate - bDate;
        }
      });

      if (!items.length) {
        grid.innerHTML = `<div class="empty">Não existem itens nesta categoria.</div>`;
        return;
      }

      grid.innerHTML = items.map(item => `
        <div class="card">
          <div class="thumb-wrap">
            ${
              item.image
                ? `<img src="${item.image}" alt="${escapeHtml(item.title)}" style="object-fit:${item.fitMode || 'cover'};">`
                : `<div class="placeholder">Sem imagem</div>`
            }
          </div>

          <div class="overlay">
            <div class="category-tag">${escapeHtml(getCategoryLabel(item.category))}</div>
            <div class="title">${escapeHtml(item.title)}</div>

            <div class="actions">
              <a class="download-btn" href="${item.link}" target="_blank" rel="noopener noreferrer">Abrir</a>
              ${
                auth.currentUser && auth.currentUser.email === ADMIN_EMAIL
                  ? `<button class="delete-btn" data-id="${item.id}">Apagar</button>`
                  : ``
              }
            </div>
          </div>
        </div>
      `).join("");

      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", async function(e) {
          e.preventDefault();

          try {
            await deleteDoc(doc(db, "items", this.dataset.id));
            await loadItems();
          } catch (error) {
            console.error(error);
            alert("Erro ao apagar item.");
          }
        });
      });
    }

    function startMessagesListener() {
      if (messagesUnsubscribe) {
        messagesUnsubscribe();
      }

      const q = query(collection(db, "messages"), orderBy("createdAt", "desc"));

      messagesUnsubscribe = onSnapshot(q, (snapshot) => {
        const docs = snapshot.docs.map(d => ({
          id: d.id,
          ...d.data()
        }));

        if (!docs.length) {
          messagesDiv.innerHTML = `<div class="empty">Ainda não existem mensagens.</div>`;
          return;
        }

        messagesDiv.innerHTML = docs.map(message => `
          <div class="msg">
            <div class="msg-top">
              <div class="msg-user">${escapeHtml(message.user || "Utilizador")}</div>
              <div class="msg-time">${escapeHtml(formatDateTime(message.createdAt))}</div>
            </div>

            <div class="msg-text">${escapeHtml(message.text || "")}</div>

            ${
              auth.currentUser && auth.currentUser.email === ADMIN_EMAIL
                ? `
                  <div class="msg-actions">
                    <button class="chat-delete-btn" data-id="${message.id}" title="Apagar">🗑</button>
                  </div>
                `
                : ``
            }
          </div>
        `).join("");

        document.querySelectorAll(".chat-delete-btn").forEach(btn => {
          btn.addEventListener("click", async function() {
            try {
              await deleteDoc(doc(db, "messages", this.dataset.id));
            } catch (error) {
              console.error(error);
              alert("Erro ao apagar mensagem.");
            }
          });
        });
      }, (error) => {
        console.error(error);
        messagesDiv.innerHTML = `<div class="empty">Erro ao carregar mensagens.</div>`;
      });
    }

    window.openModal = function() {
      const user = auth.currentUser;
      if (!user || user.email !== ADMIN_EMAIL) return;
      document.getElementById("modal").classList.add("active");
    };

    window.closeModal = function() {
      document.getElementById("modal").classList.remove("active");
      document.getElementById("title").value = "";
      document.getElementById("link").value = "";
      document.getElementById("category").value = "tools";
      document.getElementById("fitMode").value = "cover";
      document.getElementById("image").value = "";
      document.getElementById("preview").innerHTML = "Pré-visualização";
      imageData = "";
    };

    window.save = async function() {
      const user = auth.currentUser;
      if (!user || user.email !== ADMIN_EMAIL) return;

      const title = document.getElementById("title").value.trim();
      const link = document.getElementById("link").value.trim();
      const category = document.getElementById("category").value;
      const fitMode = document.getElementById("fitMode").value;

      if (!title || !link) {
        alert("Preenche o título e o link.");
        return;
      }

      try {
        await addDoc(collection(db, "items"), {
          title,
          link,
          category,
          fitMode,
          image: imageData,
          createdAt: Date.now()
        });

        await loadItems();
        closeModal();
      } catch (error) {
        console.error(error);
        alert("Erro ao guardar item.");
      }
    };

    document.getElementById("image").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        imageData = ev.target.result;
        const fitMode = document.getElementById("fitMode").value;
        document.getElementById("preview").innerHTML =
          `<img src="${imageData}" alt="Preview" style="object-fit:${fitMode};">`;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("fitMode").addEventListener("change", function() {
      if (!imageData) return;
      document.getElementById("preview").innerHTML =
        `<img src="${imageData}" alt="Preview" style="object-fit:${this.value};">`;
    });

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", function() {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        currentFilter = this.dataset.filter;
        render();
      });
    });

    document.getElementById("sortSelect").addEventListener("change", function() {
      currentSort = this.value;
      render();
    });

    document.getElementById("modal").addEventListener("click", function(e) {
      if (e.target === this) closeModal();
    });

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      loginError.textContent = "";

      if (!email || !password) {
        loginError.textContent = "Preenche o email e a password.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        console.error(error);
        loginError.textContent = "Login inválido.";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    sendBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      const text = messageInput.value.trim();

      if (!user) {
        alert("Tens de iniciar sessão para enviar mensagens.");
        return;
      }

      if (!text) {
        alert("Escreve uma mensagem.");
        return;
      }

      try {
        await addDoc(collection(db, "messages"), {
          text,
          user: user.email || "Utilizador",
          createdAt: Date.now()
        });

        messageInput.value = "";
      } catch (error) {
        console.error("Erro Firebase ao enviar mensagem:", error);
        alert("Erro ao enviar mensagem: " + (error.message || "desconhecido"));
      }
    });

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendBtn.click();
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        loginScreen.classList.remove("active");
        appLayout.classList.add("active");

        if (user.email === ADMIN_EMAIL) {
          addBtn.style.display = "inline-block";
        } else {
          addBtn.style.display = "none";
        }

        await loadItems();
        startMessagesListener();
      } else {
        appLayout.classList.remove("active");
        loginScreen.classList.add("active");
        addBtn.style.display = "none";
        grid.innerHTML = "";
        messagesDiv.innerHTML = "";

        if (messagesUnsubscribe) {
          messagesUnsubscribe();
          messagesUnsubscribe = null;
        }
      }
    });
  </script>
</body>
</html>
