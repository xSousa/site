<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: #fff;
}

.layout { display: none; }
.layout.active { display: flex; }

.sidebar {
  width: 240px;
  background: #111;
  padding: 20px;
}

.menu button {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
  border-radius: 10px;
  cursor: pointer;
}

.menu button.active {
  background: white;
  color: black;
}

.content { flex: 1; padding: 20px; }

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 200px);
  gap: 15px;
}

.card {
  width: 200px;
  height: 300px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  background: #111;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, black, transparent);
  opacity: 0;
  transition: 0.2s;
  padding: 10px;
}

.card:hover .overlay { opacity: 1; }

.download-btn, .delete-btn {
  display: block;
  margin-top: 5px;
  padding: 8px;
  text-align: center;
  border-radius: 8px;
}

.download-btn { background: white; color: black; }
.delete-btn { background: red; color: white; }

.login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
}

#sortSelect {
  padding: 10px;
  border-radius: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-screen active">
  <div class="login-box">
    <input id="loginEmail" placeholder="Email"><br><br>
    <input id="loginPassword" type="password" placeholder="Password"><br><br>
    <button id="loginBtn">Entrar</button>
  </div>
</div>

<div id="appLayout" class="layout">

<div class="sidebar">
  <div class="menu">
    <button class="filter-btn active" data-filter="all">Tudo</button>
    <button class="filter-btn" data-filter="tools">Ferramentas</button>
    <button class="filter-btn" data-filter="jogos">Jogos</button>
    <button class="filter-btn" data-filter="filmes">Filmes</button>
    <button class="filter-btn" data-filter="vsts">VSTs</button>
  </div>
</div>

<div class="content">

<div class="topbar">
  <div>
    <select id="sortSelect">
      <option value="new">Mais recentes</option>
      <option value="old">Mais antigos</option>
    </select>
  </div>

  <div>
    <button id="addBtn">+ Adicionar</button>
    <button id="logoutBtn">Sair</button>
  </div>
</div>

<div id="grid" class="grid"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrF-J4HWzpHcws_RdFSsHDrYQqgMJKgvE",
  authDomain: "content-729f5.firebaseapp.com",
  projectId: "content-729f5",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "enzo@xsousa.com";

let allItems = [];
let currentFilter = "all";
let currentSort = "new";

const grid = document.getElementById("grid");
const addBtn = document.getElementById("addBtn");

async function loadItems() {
  const snapshot = await getDocs(collection(db, "items"));
  allItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}

function render() {
  let items = allItems;

  if (currentFilter !== "all") {
    items = items.filter(i => i.category === currentFilter);
  }

  items = items.sort((a,b) =>
    currentSort === "new"
      ? b.createdAt - a.createdAt
      : a.createdAt - b.createdAt
  );

  grid.innerHTML = items.map(item => `
    <div class="card">
      <img src="${item.image || ''}">
      <div class="overlay">
        <b>${item.title}</b>
        <a class="download-btn" href="${item.link}" target="_blank">Abrir</a>
        ${
          auth.currentUser?.email === ADMIN_EMAIL
          ? `<a class="delete-btn" data-id="${item.id}">Apagar</a>`
          : ""
        }
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.onclick = async ()=>{
      await deleteDoc(doc(db,"items",btn.dataset.id));
      loadItems();
    }
  });
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  }
});

document.getElementById("sortSelect").onchange = e=>{
  currentSort = e.target.value;
  render();
};

document.getElementById("loginBtn").onclick = async ()=>{
  await signInWithEmailAndPassword(
    auth,
    loginEmail.value,
    loginPassword.value
  );
};

document.getElementById("logoutBtn").onclick = ()=>signOut(auth);

onAuthStateChanged(auth, async user=>{
  if(user){
    loginScreen.style.display="none";
    appLayout.classList.add("active");

    addBtn.style.display =
      user.email === ADMIN_EMAIL ? "inline-block" : "none";

    loadItems();
  }
});
</script>

</body>
</html>
