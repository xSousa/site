<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloads</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .add-btn {
      background: #fff;
      color: #000;
    }

    .clear-btn {
      background: #222;
      color: #fff;
      border: 1px solid #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 200px));
      gap: 16px;
      justify-content: start;
    }

    /* CARD */
    .card {
      width: 200px;
      height: 200px;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2d2d2d;
    }

    .thumb-wrap {
      width: 100%;
      height: 100%;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
      opacity: 0;
      transition: 0.25s;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    .overlay .title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .overlay .download-btn {
      background: #fff;
      color: #000;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      background: #111;
      padding: 20px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
    }

    .preview {
      width: 100%;
      aspect-ratio: 1;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>Os meus downloads</h1>
  <div class="subtitle">Hover para ver opções</div>

  <div class="topbar">
    <button class="add-btn" onclick="openModal()">+ Adicionar</button>
    <button class="clear-btn" onclick="clearAll()">Limpar</button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Adicionar</h3>

    <input id="title" placeholder="Título">
    <input id="link" placeholder="Link">

    <input type="file" id="image">
    <div class="preview" id="preview">Imagem</div>

    <button onclick="save()">Guardar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
const KEY = "items";

let imageData = "";

function getItems() {
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function saveItems(items) {
  localStorage.setItem(KEY, JSON.stringify(items));
}

function render() {
  const items = getItems();
  const grid = document.getElementById("grid");

  grid.innerHTML = items.map(item => `
    <div class="card">
      <div class="thumb-wrap">
        <img src="${item.image}">
      </div>

      <div class="overlay">
        <div class="title">${item.title}</div>
        <a class="download-btn" href="${item.link}" target="_blank">Abrir</a>
      </div>
    </div>
  `).join("");
}

function openModal() {
  document.getElementById("modal").classList.add("active");
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
}

document.getElementById("image").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(ev) {
    imageData = ev.target.result;
    document.getElementById("preview").innerHTML = `<img src="${imageData}">`;
  };

  reader.readAsDataURL(file);
});

function save() {
  const title = document.getElementById("title").value;
  const link = document.getElementById("link").value;

  if (!title || !link) return alert("Preenche tudo");

  const items = getItems();

  items.unshift({
    title,
    link,
    image: imageData
  });

  saveItems(items);
  render();
  closeModal();
}

function clearAll() {
  localStorage.removeItem(KEY);
  render();
}

render();
</script>

</body>
</html>
