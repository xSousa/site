<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conteúdo disponível</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      padding: 30px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      color: #bdbdbd;
    }

    .card {
      background: #161616;
      border: 1px solid #2b2b2b;
      border-radius: 14px;
      padding: 20px;
      margin-top: 20px;
    }

    .empty {
      color: #999;
      padding: 20px;
      text-align: center;
    }

    ul.tree {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    ul.tree ul {
      list-style: none;
      padding-left: 22px;
      margin-top: 10px;
    }

    li.item {
      margin: 10px 0;
      padding: 12px;
      background: #1d1d1d;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .name {
      font-weight: bold;
      word-break: break-word;
    }

    .meta {
      font-size: 13px;
      color: #a3a3a3;
      margin-top: 4px;
    }

    .folder {
      color: #ffd166;
    }

    .file {
      color: #7bdff2;
    }

    a.download {
      background: #ffffff;
      color: #000;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    a.download:hover {
      opacity: 0.85;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .ok {
      color: #7CFC98;
    }

    .no {
      color: #ff7b7b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Conteúdo disponível</h1>
    <p>Esta página mostra tudo o que existe dentro da pasta <strong>content</strong>.</p>

    <div class="card">
      <div id="status" class="status">A carregar...</div>
      <div id="content"></div>
    </div>
  </div>

  <script>
    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function renderItems(items) {
      if (!items || items.length === 0) {
        return '<div class="empty">A pasta content está vazia.</div>';
      }

      let html = '<ul class="tree">';

      for (const item of items) {
        if (item.type === 'folder') {
          html += `
            <li class="item">
              <div class="row">
                <div>
                  <div class="name folder">📁 ${item.name}</div>
                  <div class="meta">Pasta</div>
                </div>
              </div>
              ${item.children && item.children.length ? renderItems(item.children) : '<div class="meta" style="margin-top:10px;">Vazia</div>'}
            </li>
          `;
        } else {
          html += `
            <li class="item">
              <div class="row">
                <div>
                  <div class="name file">📄 ${item.name}</div>
                  <div class="meta">${formatSize(item.size)}</div>
                </div>
                <a class="download" href="/download/${encodeURI(item.path)}" download>Download</a>
              </div>
            </li>
          `;
        }
      }

      html += '</ul>';
      return html;
    }

    async function loadContent() {
      const status = document.getElementById('status');
      const content = document.getElementById('content');

      try {
        const res = await fetch('/api/content');
        const data = await res.json();

        if (!data.success) {
          status.className = 'status no';
          status.textContent = 'Erro ao carregar conteúdo.';
          content.innerHTML = '';
          return;
        }

        if (data.hasContent) {
          status.className = 'status ok';
          status.textContent = 'A pasta content tem conteúdo disponível.';
        } else {
          status.className = 'status no';
          status.textContent = 'A pasta content está vazia.';
        }

        content.innerHTML = renderItems(data.items);
      } catch (error) {
        status.className = 'status no';
        status.textContent = 'Erro de ligação ao servidor.';
        content.innerHTML = '';
      }
    }

    loadContent();
  </script>
</body>
</html>
