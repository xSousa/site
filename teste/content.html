<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 20px;
    }

    .card {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
    }

    .status {
      margin-bottom: 16px;
      font-weight: bold;
    }

    .ok {
      color: #7CFC98;
    }

    .error {
      color: #ff7d7d;
    }

    .empty {
      color: #999;
      padding: 14px 0;
    }

    ul.tree {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    ul.tree ul {
      list-style: none;
      padding-left: 22px;
      margin-top: 10px;
    }

    li.item {
      background: #1c1c1c;
      border: 1px solid #2f2f2f;
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .name {
      font-weight: bold;
      word-break: break-word;
    }

    .meta {
      color: #aaa;
      font-size: 13px;
      margin-top: 4px;
    }

    .folder {
      color: #ffd166;
    }

    .file {
      color: #7bdff2;
    }

    a.download {
      display: inline-block;
      text-decoration: none;
      background: #fff;
      color: #000;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
    }

    a.download:hover {
      opacity: 0.88;
    }

    .top-actions {
      margin-bottom: 16px;
    }

    .refresh-btn {
      background: #272727;
      color: white;
      border: 1px solid #3b3b3b;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .refresh-btn:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Conteúdo disponível</h1>
    <div class="subtitle">Lista automática da pasta <strong>content</strong> do GitHub</div>

    <div class="card">
      <div class="top-actions">
        <button class="refresh-btn" onclick="loadContent()">Atualizar</button>
      </div>

      <div id="status" class="status">A carregar...</div>
      <div id="content"></div>
    </div>
  </div>

  <script>
    // ============================================
    // ALTERA APENAS ISTO
    // ============================================
    const GITHUB_USER = "TEU_USER";
    const GITHUB_REPO = "TEU_REPO";
    const GITHUB_BRANCH = "main"; // ou master
    const CONTENT_PATH = "Content";
    // ============================================

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatSize(bytes) {
      if (!bytes && bytes !== 0) return "";
      if (bytes === 0) return "0 B";
      const units = ["B", "KB", "MB", "GB", "TB"];
      let i = 0;
      let size = bytes;
      while (size >= 1024 && i < units.length - 1) {
        size /= 1024;
        i++;
      }
      return `${size.toFixed(size >= 10 || i === 0 ? 0 : 2)} ${units[i]}`;
    }

    async function fetchFolder(path) {
      const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${encodeURIComponent(path).replace(/%2F/g, "/")}?ref=${encodeURIComponent(GITHUB_BRANCH)}`;
      const res = await fetch(apiUrl);

      if (!res.ok) {
        throw new Error(`Erro GitHub API: ${res.status}`);
      }

      const data = await res.json();

      if (!Array.isArray(data)) {
        return [];
      }

      const folders = data.filter(item => item.type === "dir").sort((a, b) => a.name.localeCompare(b.name));
      const files = data.filter(item => item.type === "file").sort((a, b) => a.name.localeCompare(b.name));
      const ordered = [...folders, ...files];

      const result = [];

      for (const item of ordered) {
        if (item.type === "dir") {
          const children = await fetchFolder(item.path);
          result.push({
            type: "folder",
            name: item.name,
            path: item.path,
            children
          });
        } else if (item.type === "file") {
          result.push({
            type: "file",
            name: item.name,
            path: item.path,
            size: item.size || 0,
            download_url: item.download_url
          });
        }
      }

      return result;
    }

    function renderItems(items) {
      if (!items || items.length === 0) {
        return `<div class="empty">A pasta content está vazia.</div>`;
      }

      let html = `<ul class="tree">`;

      for (const item of items) {
        if (item.type === "folder") {
          html += `
            <li class="item">
              <div class="row">
                <div>
                  <div class="name folder">📁 ${escapeHtml(item.name)}</div>
                  <div class="meta">Pasta</div>
                </div>
              </div>
              ${item.children && item.children.length
                ? renderItems(item.children)
                : `<div class="meta" style="margin-top:10px;">Vazia</div>`}
            </li>
          `;
        } else {
          html += `
            <li class="item">
              <div class="row">
                <div>
                  <div class="name file">📄 ${escapeHtml(item.name)}</div>
                  <div class="meta">${formatSize(item.size)}</div>
                </div>
                <a class="download" href="${item.download_url}" download target="_blank" rel="noopener noreferrer">
                  Download
                </a>
              </div>
            </li>
          `;
        }
      }

      html += `</ul>`;
      return html;
    }

    async function loadContent() {
      const status = document.getElementById("status");
      const content = document.getElementById("content");

      status.className = "status";
      status.textContent = "A carregar...";
      content.innerHTML = "";

      try {
        const items = await fetchFolder(CONTENT_PATH);

        if (items.length > 0) {
          status.className = "status ok";
          status.textContent = "A pasta content tem conteúdo disponível.";
        } else {
          status.className = "status";
          status.textContent = "A pasta content está vazia.";
        }

        content.innerHTML = renderItems(items);
      } catch (err) {
        status.className = "status error";
        status.textContent = "Erro ao ler a pasta content do GitHub.";
        content.innerHTML = `
          <div class="empty">
            Confirma se:
            <br><br>
            - o repositório existe
            <br>
            - o nome do utilizador está correto
            <br>
            - o branch está certo
            <br>
            - a pasta <strong>content</strong> existe
            <br>
            - o repositório é público
          </div>
        `;
        console.error(err);
      }
    }

    loadContent();
  </script>
</body>
</html>
